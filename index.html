<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Jegadeesan & Janani</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-accent: #FFD700;
            --royal-purple: #6A0DAD;
            --marigold-orange: #FF8C00;
            --marigold-yellow: #FFD700;
            --text-dark: #333;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding-bottom: 80px; 
            text-align: center; 
            background: #fffcf5;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* --- CSS GENERATED FLOWERS (No Images Needed) --- */
        .decor-top {
            position: relative;
            width: 100%;
            height: 120px;
            background: transparent;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .flower-chain {
            display: flex;
            gap: 5px;
            padding-top: 10px;
        }

        .marigold {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--marigold-yellow) 30%, var(--marigold-orange) 100%);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            position: relative;
        }

        .marigold::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* --- SVG BELLS (Embedded - Will always load) --- */
        .bell-container {
            position: absolute;
            width: 100%;
            top: 40px;
            pointer-events: none;
        }

        .bell-svg {
            width: 50px;
            height: auto;
            position: absolute;
            transform-origin: top center;
            animation: bellSway 3s ease-in-out infinite alternate;
        }

        .bell-1 { left: 15%; animation-delay: 0s; }
        .bell-2 { left: 50%; transform: translateX(-50%); width: 65px; animation-delay: 0.5s; }
        .bell-3 { right: 15%; animation-delay: 0.2s; }

        @keyframes bellSway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* --- HEADER & TEXT --- */
        .invitation-top {
            background-color: var(--royal-purple);
            color: white;
            padding: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 15;
            position: relative;
        }

        header { padding: 40px 20px; position: relative; }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            color: var(--royal-purple); 
            margin: 10px 0;
        }

        .golden-initial {
            background: linear-gradient(to bottom, #FFD700 0%, #D4AF37 40%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.2em; 
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15));
            display: inline-block;
            padding: 0 10px;
            margin-right: -10px;
        }
