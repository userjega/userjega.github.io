<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Jegadeesan & Janani</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-accent: #FFD700;
            --royal-purple: #6A0DAD;
            --text-dark: #333;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding-bottom: 80px; 
            text-align: center; 
            background: linear-gradient(135deg, #fffcf5 0%, #f7e9d7 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* TRADITIONAL DECORATION CONTAINER */
        .decor-top {
            position: relative;
            width: 100%;
            height: 180px;
            background: transparent;
            z-index: 10;
        }

        /* Marigold Border (Genda Phool) */
        .marigold-border {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: auto;
            content: url('https://i.ibb.co/v4m0YmH/marigold-top.png'); /* Placeholder marigold image */
            z-index: 12;
        }

        /* Hanging Bells with Sway Animation */
        .bell {
            position: absolute;
            width: 50px;
            height: auto;
            content: url('https://i.ibb.co/fDbj9zM/temple-bell.png'); /* Placeholder bell image */
            z-index: 11;
            transform-origin: top center;
            animation: bellSway 3s ease-in-out infinite alternate;
        }
        .bell-1 { left: 10%; top: 40px; animation-delay: 0s; }
        .bell-2 { left: 50%; transform: translateX(-50%); top: 30px; width: 65px; animation-delay: 0.5s; }
        .bell-3 { right: 10%; top: 40px; animation-delay: 0.2s; }

        @keyframes bellSway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
