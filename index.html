<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Jegadeesan & Janani</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-accent: #FFD700;
            --royal-purple: #6A0DAD;
            --text-dark: #333;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding-bottom: 80px; 
            text-align: center; 
            background: #fffcf5;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* --- SHARED INITIAL DESIGN --- */
        .name-wrapper {
            position: relative;
            display: inline-block;
            margin: 60px auto 20px;
            padding: 20px 40px; /* Provides space so the 'J' tail isn't cut */
            min-height: 180px;
        }

        .shared-initial {
            font-family: 'Great Vibes', cursive;
            background: linear-gradient(to bottom, #FFD700 0%, #D4AF37 40%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 180px;
            line-height: 1;
            display: inline-block;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.15));
            position: relative;
            z-index: 2;
        }

        .name-suffix {
            font-family: 'Great Vibes', cursive;
            color: var(--royal-purple);
            font-size: 60px;
            position: absolute;
            white-space: nowrap;
            z-index: 3;
        }

        /* Positioning Jegadeesan above the 'J' stem */
        .suffix-top {
            top: 25px;
            left: 140px;
        }

        /* Positioning Janani below the 'J' curve */
        .suffix-bottom {
            bottom: 35px;
            left: 140px;
        }

        .ampersand {
            position: absolute;
            font-family: 'Great Vibes', cursive;
            color: var(--royal-purple);
            font-size: 30px;
            left: 145px;
            top: 85px;
        }

        .date-sub {
            letter-spacing: 5px;
            font-size: 1.2rem;
            font-weight: 300;
            margin-top: -20px;
        }

        /* --- SECTIONS & UI --- */
        #timer-box {
            background: white;

<div id="timer-box">
            <div class="timer-unit"><span class="timer-num" id="days">00</span><span class="timer-label">Days</span></div>
            <div class="timer-unit"><span class="timer-num" id="hours">00</span><span class="timer-label">Hours</span></div>
            <div class="timer-unit"><span class="timer-num" id="mins">00</span><span class="timer-label">Mins</span></div>
            <div class="timer-unit"><span class="timer-num" id="secs">00</span><span class="timer-label">Secs</span></div>
        </div>
    </header>

    <section class="section" id="details">
        <h2>Event Details</h2>
        <div style="margin-bottom: 35px;">
            <p><strong style="color: var(--royal-purple); letter-spacing: 1px;">RECEPTION</strong><br>
            Thursday, 28-May-2026 | 6:00 PM Onwards<br>
            <strong>Venue:</strong> Ranjan Mahal, Poigai, Vellore</p>
            <a href="https://share.google/LQMSGszKMSwAHp4c7" target="_blank" class="btn">Navigate to Mahal</a>
        </div>
        <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); width: 30%; margin: 25px auto;">
        <div style="margin-top: 25px;">
            <p><strong style="color: var(--royal-purple); letter-spacing: 1px;">MARRIAGE</strong><br>
            Friday, 29-May-2026 | 6:30 AM <br> 
            <strong>Venue:</strong> Vellore Fort Temple</p>
            <a href="https://share.google/q5qngUrx8wuOqvQAw" target="_blank" class="btn">Navigate to Temple</a>
        </div>
    </section>

    <section class="section" id="rsvp" style="background-color: #fcfaff; border-color: var(--royal-purple);">
        <h2>RSVP</h2>
        <p>We look forward to celebrating with you.</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfpmHc4kP5G3FfzuSjM17U2vxWOTuV9x1Ix0Md1-ZniEpWNaw/viewform" target="_blank" class="btn">Confirm Attendance</a>
    </section>

    <div id="musicControl" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
    </div>

    <nav class="bottom-nav">
        <a href="#home">HOME</a>
        <a href="#details">DETAILS</a>
        <a href="#rsvp">RSVP</a>
    </nav>

    <script>
        const weddingDate = new Date("May 29, 2026 06:30:00").getTime();
        
        setInterval(function() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            
            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById("days").innerHTML = d.toString().padStart(2, '0');
                document.getElementById("hours").innerHTML = h.toString().padStart(2, '0');
                document.getElementById("mins").innerHTML = m.toString().padStart(2, '0');
                document.getElementById("secs").innerHTML = s.toString().padStart(2, '0');
            }
        }, 1000);

        function toggleMusic() {
            const music = document.getElementById("weddingMusic");
            const icon = document.getElementById("musicIcon");
            if (music.paused) {
                music.play();
                icon.innerHTML = "⏸️";
            } else {
                music.pause();
                icon.innerHTML = "🎵";
            }
        }
    </script>
</body>
</html>
