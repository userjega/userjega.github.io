<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding | Save the Date</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; color: #333; background-color: #f9f6f2; }
        header { padding: 100px 20px; background: white; }
        h1 { font-family: 'Alex Brush', cursive; font-size: 4rem; color: #a68a64; margin-bottom: 10px; }
        .date { font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase; }
        .section { padding: 60px 20px; }
        .btn { background: #a68a64; color: white; padding: 15px 30px; text-decoration: none; border-radius: 30px; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #8e7352; }
        img { max-width: 100%; height: auto; border-radius: 10px; margin-top: 20px; }
        #countdown { font-size: 1.2rem; font-weight: bold; margin-top: 10px; color: #a68a64; }
    </style>
</head>
<body>

    <header>
        <h1>Jegadeesan & Janani</h1>
        <div class="date">May 28, 2026</div>
        <div id="countdown">Loading countdown...</div>
    </header>

    <section class="section">
        <h2>The Big Day</h2>
        <p>We can't wait to celebrate our love with you!</p>
        <p><strong>Reception:</strong> 7:00 PM at The Ranjan Mahal, Poigai, Vellore</p>
        <p><strong>Marriage:</strong> 6:30 AM at Vellore Fort</p>
        <a href="https://maps.google.com" target="https://share.google/LQMSGszKMSwAHp4c7" class="btn">View Map</a>
    </section>

    <section class="section" style="background-color: #fff;">
        <h2>RSVP</h2>
        <p>Please let us know if you can make it.</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfpmHc4kP5G3FfzuSjM17U2vxWOTuV9x1Ix0Md1-ZniEpWNaw/viewform?usp=publish-editor" class="btn">RSVP Now</a>
    </section>

    <script>
        // Simple Countdown Timer
        const weddingDate = new Date("May 28, 2026 19:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("countdown").innerHTML = days + " Days to Go!";
        }, 1000);
    </script>
</body>
</html>
