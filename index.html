<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Jegadeesan & Janani</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-accent: #FFD700;
            --royal-purple: #6A0DAD;
            --text-dark: #333;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding-bottom: 80px; 
            text-align: center; 
            background: linear-gradient(135deg, #fffcf5 0%, #f7e9d7 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        .invitation-top {
            background-color: var(--royal-purple);
            color: white;
            padding: 16px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header { padding: 40px 10px; position: relative; }

        /* SHARED SINGLE J LAYOUT */
        .name-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Great Vibes', cursive;
            color: var(--royal-purple);
            gap: 0;
            margin: 20px 0;
        }

        .shared-j {
            background: linear-gradient(to bottom, #FFD700 0%, #D4AF37 40%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: clamp(5rem, 15vw, 7.5rem); 
            line-height: 1;
            padding: 0 15px; /* Prevents cutting */
            filter: drop-shadow(3px 3px 4px rgba(0,0,0,0.15));
        }

        .name-part {
            font-size: clamp(2rem, 6vw, 3.5rem);
            display: flex;
            flex-direction: column;
            text-align: left;
            line-height: 0.9;
        }

        .ampersand {
            font-size: 0.5em;
            margin: 5px 0;
            opacity: 0.7;
        }

        #timer-box {
            background: white;
            display: inline-flex;
            padding: 20px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(106, 13, 173, 0.1);
            margin: 30px 0;
            border: 1px solid var(--gold-accent);
        }
        .timer-unit { margin: 0 10px; }
        .timer-num { display: block; font-size: 1.6rem; font-weight: bold; color: var(--royal-purple); }
        .timer-label { font-size: 0.65rem; text-transform: uppercase; color: #888; font-weight: 600; }

        .section { 
            padding: 40px 20px; 
            background: rgba(255, 255, 255, 0.95); 
            margin: 25px auto;
            max-width: 600px;
            border-radius: 20px; 
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .btn { 
            background: var(--royal-purple); color: white; padding: 14px 25px; 
            text-decoration: none; border-radius: 35px; display: inline-block; 
            margin: 15px 5px; font-weight: bold; transition: 0.3s ease;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: white; display: flex; justify-content: space-around;
            padding: 18px 0; border-top: 1px solid var(--gold-accent);
            z-index: 1000;
        }
        .bottom-nav a { text-decoration: none; color: var(--royal-purple); font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
