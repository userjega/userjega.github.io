<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Jegadeesan & Janani</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-accent: #FFD700;
            --soft-saffron: #FFB347;
            --royal-purple: #6A0DAD;
            --text-dark: #333;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding-bottom: 80px; 
            text-align: center; 
            background: linear-gradient(135deg, #fffcf5 0%, #f7e9d7 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* DIVINE LIGHTS GRAPHICS */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.12) 1%, transparent 20%);
            background-size: 150px 150px;
            pointer-events: none;
            z-index: 0;
            animation: divineShimmer 15s linear infinite;
        }

        @keyframes divineShimmer {
            0% { background-position: 0 0; opacity: 0.5; }
            50% { opacity: 1; }
            100% { background-position: 300px 300px; opacity: 0.5; }
        }

        .invitation-top {
            background-color: var(--royal-purple);
            color: white;
            padding: 14px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
        }

        header { 
            padding: 80px 20px;
            position: relative;
            z-index: 1;
        }

        h1 { 
            font-family: 'Great Vibes', cursive; 
            font-size: 4rem; 
            color: var(--royal-purple); 
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        h2 { 
            color: var(--royal-purple); 
            font-family: 'Great Vibes', cursive; 
            font-size: 3rem; 
            margin-bottom: 10px;
        }

        #timer-box {
            background: white;
            display: inline-flex;
            padding: 20px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(106, 13, 173, 0.1);
            margin: 30px 0;
            border: 1px solid var(--gold-accent);
        }
        .timer-unit { margin: 0 12px; }
        .timer-num { display: block; font-size: 1.6rem; font-weight: bold; color: var(--royal-purple); }
